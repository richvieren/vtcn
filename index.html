<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VTCN</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100%;
  background: #000;
  color: #fff;
  font-family: 'Inter', sans-serif;
}

.logo {
  display: flex;
  justify-content: center;
  padding: 48px 24px 32px;
}

.logo img {
  height: 80px;
  width: auto;
}

.videos {
  display: flex;
  gap: 16px;
  padding: 0 24px;
  max-width: 1400px;
  margin: 0 auto;
}

.videos .video-wrap {
  flex: 1;
  position: relative;
  padding-bottom: 56.25%;
  height: 0;
  overflow: hidden;
}

.videos .video-wrap iframe {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  border: none;
}

footer {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  border-top: 1px solid rgba(255, 255, 255, 0.15);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  background: rgba(0, 0, 0, 0.6);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  z-index: 10;
  font-size: 12px;
  letter-spacing: 0.05em;
}

footer .tagline {
  color: rgba(255, 255, 255, 0.5);
  font-weight: 300;
}

footer .tagline a {
  color: rgba(255, 255, 255, 0.7);
  text-decoration: none;
  font-weight: 500;
}

footer .tagline a:hover {
  color: #fff;
}

footer .social {
  display: flex;
  gap: 12px;
}

footer .social a {
  display: inline-flex;
  align-items: center;
  color: rgba(255, 255, 255, 0.5);
  text-decoration: none;
  transition: color 0.2s;
}

footer .social a:hover {
  color: #fff;
}

footer .social svg {
  width: 18px;
  height: 18px;
}

@media (max-width: 768px) {
  .logo {
    padding: 32px 16px 24px;
  }

  .logo img {
    height: 56px;
  }

  .videos {
    flex-direction: column;
    gap: 12px;
    padding: 0 16px;
  }

  footer {
    flex-direction: column;
    gap: 12px;
    text-align: center;
  }
}
</style>
</head>
<body>

<div class="logo">
  <img src="vtcnlogo.png" alt="VTCN">
</div>

<div class="videos">
  <div class="video-wrap">
    <iframe src="https://player.vimeo.com/video/1206834233?background=1&autoplay=1&loop=1&muted=1&quality=1080p" allow="autoplay; fullscreen" allowfullscreen></iframe>
  </div>
  <div class="video-wrap">
    <iframe src="https://player.vimeo.com/video/1206861008?background=1&autoplay=1&loop=1&muted=1&quality=1080p" allow="autoplay; fullscreen" allowfullscreen></iframe>
  </div>
</div>

<footer>
  <span class="tagline"><strong>VTCN</strong> is the professional slop dump of <a href="https://vieren.studio" target="_blank">VIEREN</a></span>
  <span class="social">
    <a href="https://instagram.com/vtcn" target="_blank" aria-label="Instagram">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="2" width="20" height="20" rx="5"/>
        <circle cx="12" cy="12" r="5"/>
        <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/>
      </svg>
    </a>
    <a href="https://x.com/richvieren" target="_blank" aria-label="X">
      <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
      </svg>
    </a>
  </span>
</footer>

</body>
</html>
